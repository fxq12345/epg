name: EPG 稳定更新

on:
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      # 升级到兼容 Node.js 24 的 checkout@v5
      - uses: actions/checkout@v5

      # 升级到兼容 Node.js 24 的 setup-python@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 生成 EPG
        run: python epg.py

      - name: 提交更新
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add output/epg.gz
          git commit -m "EPG $(date +%F)" || echo "no changes"
          git push
