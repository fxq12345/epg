name: Auto Update EPG (多线程+3次重试 稳定版)

on:
  schedule:
    - cron: '0 16 * * *'  # 北京时间0点
    - cron: '0 4 * * *'   # 北京时间12点
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 10  # 超时保护，防止卡死

    steps:
      - uses: actions/checkoname: Auto Update EPG (三线程稳定版)

on:
  schedule:
    - cron: '0 16 * * *'  # 北京时间0点
    - cron: '0 4 * * *'   # 北京时间12点
  workflow_dispatch:  # 手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 10  # 10分钟超时保护

    steps:
      - uses: actions/checkout@v4

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp tqdm opencc lxml requests

      - name: 运行三线程EPG脚本
        run: |
          chmod +x merge.py
          python3 merge.py
          ls -lh output/

      - name: 验证压缩包
        run: |
          if [ ! -f "output/epg.gz" ]; then echo "❌ 无epg.gz"; exit 1; fi
          gunzip -c output/epg.gz > output/epg.xml
          if [ ! -f "output/epg.xml" ]; then echo "❌ 解压失败"; exit 1; fi
          echo "✅ 验证通过：epg.gz 内含 epg.xml"

      - name: 提交并推送
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add -f output/epg.gz
          git commit -m "三线程更新 EPG $(date +'%Y-%m-%d %H:%M')" || exit 0
          git push
