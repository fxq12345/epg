name: 自动构建与运行
on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: 配置 Python 环境
        run: |
          echo "Python 环境配置完成"
      
      - name: 运行主脚本
        run: |
          python3 main.py  # 你的主脚本入口
      
      - name: 完成提示
        run: |
          echo "✅ 工作流执行完成！"
